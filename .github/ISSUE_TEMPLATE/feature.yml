name: Feature request
description: Propose an addition or change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do (or can't do safely) today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: >-
        veracium's guarantees (quarantine, supersession-with-history, grounded
        abstention) are load-bearing — say how the proposal interacts with them,
        if at all.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
